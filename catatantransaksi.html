<html lang="id">

    <!-- PWA Setup & Application Logic -->
    <script>
        // -------------------------------------------------------------
        // BLOK SETUP PWA (Dinamis via Blob URL untuk Single File)
        // -------------------------------------------------------------
        
        // 1. Generate App Icon (SVG Base64)
        const appIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="%236366f1"><rect width="512" height="512" fill="%23eef2ff" rx="100"/><path stroke="%236366f1" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" d="M192 256h128m-128 85h128m42 106H128a42 42 0 01-42-42V106a42 42 0 0142-42h119a21 21 0 0115 6l115 115a21 21 0 016 15v204a42 42 0 01-42 42z"/></svg>`;
        const appIconUrl = "data:image/svg+xml;charset=utf-8," + appIconSvg;

        // 2. Buat Manifest JSON
        const manifest = {
            name: "Rekap Transaksi Premium",
            short_name: "RekapBill",
            start_url: location.href,
            display: "standalone",
            background_color: "#f8fafc",
            theme_color: "#6366f1",
            icons: [
                { src: appIconUrl, sizes: "192x192 512x512", type: "image/svg+xml", purpose: "any maskable" }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

        // 3. Setup Service Worker untuk mode Offline & Installable
        const swCode = `
            const CACHE_NAME = 'rekapbill-v1';
            self.addEventListener('install', e => { self.skipWaiting(); });
            self.addEventListener('activate', e => { clients.claim(); });
            self.addEventListener('fetch', e => {
                e.respondWith(
                    fetch(e.request).catch(() => new Response('Aplikasi sedang berjalan offline.'))
                );
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Registration failed', err));
            });
        }

        // 4. Logika Tombol Instal (A2HS - Add to Home Screen)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Tampilkan tombol instal jika tidak sedang dalam mode PWA (standalone)
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('install-btn').classList.remove('hidden');
            }
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('install-btn').classList.add('hidden');
                    }
                    deferredPrompt = null;
                });
            }
        }


        // -------------------------------------------------------------
        // BLOK LOGIKA APLIKASI (State, Render, LocalStorage)
        // -------------------------------------------------------------
        
        let persons = [];
        const STORAGE_KEY = 'splitbill_data';
        let deleteTarget = { type: null, personId: null, itemId: null };

        function formatRupiah(angka) {
            if(!angka) return '';
            let number_string = angka.toString().replace(/[^,\d]/g, ''),
                split = number_string.split(','),
                sisa = split[0].length % 3,
                rupiah = split[0].substr(0, sisa),
                ribuan = split[0].substr(sisa).match(/\d{3}/gi);
            if (ribuan) rupiah += (sisa ? '.' : '') + ribuan.join('.');
            return rupiah;
        }

        function escapeHTML(str) {
            return (str || '').toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(persons));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            document.getElementById('app-container').innerHTML = ''; 
            
            if (saved) {
                try {
                    persons = JSON.parse(saved);
                    if (persons.length > 0) {
                        persons.forEach(p => renderPersonToDOM(p));
                    } else {
                        addPerson(); 
                    }
                } catch(e) { addPerson(); }
            } else {
                addPerson();
            }
        }

        function showAlert(message) {
            document.getElementById('alert-message').innerText = message;
            const modal = document.getElementById('alert-modal');
            const panel = document.getElementById('alert-panel');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('scale-95'); }, 10);
        }

        function closeAlertModal() {
            const modal = document.getElementById('alert-modal');
            const panel = document.getElementById('alert-panel');
            modal.classList.add('opacity-0'); panel.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function confirmRemovePerson(personId) {
            deleteTarget = { type: 'person', personId: personId, itemId: null };
            document.getElementById('confirm-title').innerText = "Hapus Orang";
            document.getElementById('confirm-desc').innerText = "Yakin ingin menghapus orang ini beserta pesanan di dalamnya?";
            showConfirmModal();
        }

        function confirmRemoveItem(personId, itemId) {
            deleteTarget = { type: 'item', personId: personId, itemId: itemId };
            document.getElementById('confirm-title').innerText = "Hapus Pesanan";
            document.getElementById('confirm-desc').innerText = "Yakin ingin menghapus pesanan ini?";
            showConfirmModal();
        }

        function confirmResetAll() {
            deleteTarget = { type: 'reset' };
            document.getElementById('confirm-title').innerText = "Reset Semua Catatan";
            document.getElementById('confirm-desc').innerText = "Seluruh data transaksi yang tersimpan akan dihapus secara permanen. Lanjutkan?";
            showConfirmModal();
        }

        function showConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const panel = document.getElementById('confirm-panel');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('scale-95'); }, 10);
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const panel = document.getElementById('confirm-panel');
            modal.classList.add('opacity-0'); panel.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                deleteTarget = { type: null, personId: null, itemId: null };
            }, 200);
        }

        function executeDelete() {
            if (deleteTarget.type === 'person') removePerson(deleteTarget.personId);
            else if (deleteTarget.type === 'item') removeItem(deleteTarget.personId, deleteTarget.itemId);
            else if (deleteTarget.type === 'reset') resetAllData();
            closeConfirmModal();
        }

        function togglePerson(personId) {
            const person = persons.find(p => p.id === personId);
            if (!person) return;
            person.isExpanded = !person.isExpanded;
            const wrapper = document.getElementById(`wrapper-${personId}`);
            const icon = document.getElementById(`icon-${personId}`);
            if (person.isExpanded) { wrapper.classList.remove('collapsed'); icon.classList.add('rotate-180'); } 
            else { wrapper.classList.add('collapsed'); icon.classList.remove('rotate-180'); }
            saveData();
        }

        function addPerson() {
            persons.forEach(p => {
                if (p.isExpanded) {
                    p.isExpanded = false;
                    const wrapper = document.getElementById(`wrapper-${p.id}`);
                    const icon = document.getElementById(`icon-${p.id}`);
                    if (wrapper) wrapper.classList.add('collapsed');
                    if (icon) icon.classList.remove('rotate-180');
                }
            });

            const newPerson = { id: 'p_' + Date.now().toString(), name: '', items: [], isExpanded: true };
            persons.push(newPerson);
            
            renderPersonToDOM(newPerson);
            addItem(newPerson.id); 
            
            saveData();

            setTimeout(() => {
                const el = document.getElementById(`person-${newPerson.id}`);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function renderPersonToDOM(person) {
            const div = document.createElement('div');
            div.className = 'bg-white rounded-2xl shadow-sm border border-slate-200/80 relative animate-fade-in group/card transition-all hover:shadow-md';
            div.id = `person-${person.id}`;
            
            div.innerHTML = `
                <div class="p-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2 w-full">
                            <button onclick="togglePerson('${person.id}')" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center shrink-0 text-slate-500 transition-colors" title="Buka/Tutup">
                                <svg id="icon-${person.id}" class="w-4 h-4 transform transition-transform duration-300 ${person.isExpanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            
                            <input type="text" placeholder="Nama Orang (misal: dr. Rendy)" 
                                   value="${escapeHTML(person.name)}"
                                   class="w-full font-bold text-base text-slate-800 bg-transparent outline-none placeholder-slate-300 border-b-2 border-transparent focus:border-brand-500 transition-colors py-1" 
                                   oninput="updatePersonName('${person.id}', this.value)">
                        </div>
                        
                        <button onclick="confirmRemovePerson('${person.id}')" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors shrink-0 ml-2" title="Hapus Orang">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>

                    <div id="wrapper-${person.id}" class="collapsible-wrapper ${person.isExpanded ? '' : 'collapsed'}">
                        <div class="collapsible-inner">
                            <div class="mt-4 pt-4 border-t border-slate-100">
                                <div id="items-${person.id}" class="space-y-2 mb-3"></div>
                                <button onclick="addItem('${person.id}')" class="text-xs font-semibold text-brand-600 flex items-center gap-1 py-1.5 px-2.5 rounded-md bg-brand-50/80 hover:bg-brand-100/80 transition-colors w-max">
                                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                                    Tambah Item
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border-t border-slate-100 flex justify-between items-center bg-slate-50/50 p-3 px-4 rounded-b-2xl">
                    <div class="flex items-center gap-2">
                        <span class="text-[13px] font-medium text-slate-500">Total</span>
                        <span class="text-[11px] bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded font-medium" id="item-count-${person.id}">0 Item</span>
                    </div>
                    <span class="text-lg font-bold text-slate-800 tracking-tight">Rp <span id="total-${person.id}" class="text-emerald-600">0</span></span>
                </div>
            `;
            
            document.getElementById('app-container').appendChild(div);
            
            if(person.items && person.items.length > 0) {
                person.items.forEach(item => renderItemToDOM(person.id, item));
            }
            recalculateTotal(person.id);
        }

        function addItem(personId) {
            const person = persons.find(p => p.id === personId);
            if (!person) return;
            const newItem = { id: 'i_' + Date.now().toString() + Math.floor(Math.random() * 100), name: '', price: 0 };
            person.items.push(newItem);
            renderItemToDOM(personId, newItem);
            recalculateTotal(personId);
            saveData();
        }

        function renderItemToDOM(personId, item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'flex items-center gap-2 animate-fade-in group';
            itemDiv.id = `item-${item.id}`;
            itemDiv.innerHTML = `
                <div class="relative flex-[5]">
                    <input type="text" placeholder="Nama pesanan" value="${escapeHTML(item.name)}"
                           class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700 outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-500/10 transition-all placeholder-slate-300" 
                           oninput="updateItemName('${personId}', '${item.id}', this.value)">
                </div>
                <div class="relative flex-[4]">
                    <div class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none">
                        <span class="text-slate-400 text-xs font-semibold">Rp</span>
                    </div>
                    <input type="text" inputmode="numeric" placeholder="0" value="${item.price > 0 ? formatRupiah(item.price) : ''}"
                           class="w-full bg-white border border-slate-200 rounded-lg pl-7 pr-2 py-2 text-sm text-slate-800 font-semibold outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-500/10 transition-all placeholder-slate-300" 
                           oninput="updateItemPrice('${personId}', '${item.id}', this)">
                </div>
                <button onclick="confirmRemoveItem('${personId}', '${item.id}')" class="text-slate-300 hover:text-red-500 p-1.5 rounded-lg hover:bg-red-50 transition-colors shrink-0">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            document.getElementById(`items-${personId}`).appendChild(itemDiv);
        }

        function updatePersonName(personId, newName) {
            const person = persons.find(p => p.id === personId);
            if(person) { person.name = newName; saveData(); }
        }

        function updateItemName(personId, itemId, newName) {
            const person = persons.find(p => p.id === personId);
            if(person) {
                const item = person.items.find(i => i.id === itemId);
                if(item) { item.name = newName; saveData(); }
            }
        }

        function updateItemPrice(personId, itemId, inputElem) {
            let rawValue = inputElem.value.replace(/[^0-9]/g, '');
            if (rawValue) {
                rawValue = parseInt(rawValue, 10).toString(); 
                inputElem.value = formatRupiah(rawValue);
            } else {
                inputElem.value = ''; rawValue = 0;
            }
            const person = persons.find(p => p.id === personId);
            if(person) {
                const item = person.items.find(i => i.id === itemId);
                if(item) item.price = parseInt(rawValue) || 0;
            }
            recalculateTotal(personId);
            saveData();
        }

        function recalculateTotal(personId) {
            const person = persons.find(p => p.id === personId);
            if(!person) return;
            const total = person.items.reduce((sum, item) => sum + item.price, 0);
            document.getElementById(`total-${personId}`).innerText = formatRupiah(total) || '0';
            const countLabel = document.getElementById(`item-count-${personId}`);
            if (countLabel) countLabel.innerText = `${person.items.length} Item`;
        }

        function removePerson(personId) {
            persons = persons.filter(p => p.id !== personId);
            const el = document.getElementById(`person-${personId}`);
            if(el) {
                el.style.opacity = 0; el.style.transform = 'scale(0.95)';
                setTimeout(() => el.remove(), 200);
            }
            saveData();
        }

        function removeItem(personId, itemId) {
            const person = persons.find(p => p.id === personId);
            if(!person) return;
            person.items = person.items.filter(i => i.id !== itemId);
            const el = document.getElementById(`item-${itemId}`);
            if(el) {
                el.style.opacity = 0;
                setTimeout(() => { el.remove(); recalculateTotal(personId); }, 200);
            }
            saveData();
        }

        function resetAllData() {
            persons = [];
            document.getElementById('app-container').innerHTML = '';
            localStorage.removeItem(STORAGE_KEY);
            addPerson(); 
            showAlert("Seluruh catatan transaksi telah di-reset.");
        }

        function generateWA() {
            const hasData = persons.some(p => p.name.trim() !== '' || p.items.some(i => i.name.trim() !== '' || i.price > 0));
            if (!hasData) {
                showAlert("Silakan isi data nama orang atau pesanan terlebih dahulu.");
                return;
            }
            let text = '';
            persons.forEach((p, index) => {
                const personName = p.name.trim() || 'Tanpa Nama';
                text += `👤 *${personName}*\n`;
                let totalPerson = 0;
                p.items.forEach(item => {
                    const itemName = item.name.trim();
                    const itemPrice = item.price || 0;
                    if(itemName || itemPrice > 0) {
                        text += `- ${itemName || 'Item'} ${formatRupiah(itemPrice)}\n`;
                        totalPerson += itemPrice;
                    }
                });
                text += `*Total ${formatRupiah(totalPerson)}*\n`;
                if (index < persons.length - 1) text += `______________________________\n\n`;
            });
            document.getElementById('wa-result').value = text;
            const modal = document.getElementById('wa-modal');
            const panel = document.getElementById('modal-panel');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('scale-95'); }, 10);
            resetCopyButton();
        }

        function sendToWhatsApp() {
            const text = document.getElementById('wa-result').value;
            const waUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(waUrl, '_blank');
        }

        function resetCopyButton() {
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerHTML = `
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                <span>Salin</span>
            `;
            copyBtn.className = "flex-[1] py-2.5 px-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-semibold flex items-center justify-center gap-1.5 transition-colors active:scale-[0.98]";
        }

        function copyToClipboard() {
            const textarea = document.getElementById('wa-result');
            textarea.select(); textarea.setSelectionRange(0, 99999); 
            try { if (document.execCommand('copy')) showCopySuccess(); } catch(e) { console.error(e); }
            if (window.getSelection) window.getSelection().removeAllRanges();
        }

        function showCopySuccess() {
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerHTML = `
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                <span>Disalin!</span>
            `;
            copyBtn.className = "flex-[1] py-2.5 px-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl text-sm font-semibold flex items-center justify-center gap-1.5 transition-colors active:scale-[0.98]";
        }

        function closeModal() {
            const modal = document.getElementById('wa-modal');
            const panel = document.getElementById('modal-panel');
            modal.classList.add('opacity-0'); panel.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // Init
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
